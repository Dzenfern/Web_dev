<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    /* Write your code here */
    .blue-box{
      position: relative;
      background-color: blue;
      width: 500px;
      height: 300px;
      left: 200px;
      top: 200px;
      border-radius: 70% 20% 10% 10%;
    }
    .red-circle{
      position: absolute;
      background-color: red;
      width: 200px;
      height: 200px;
      border-radius: 100%;
    }
    #w1{
      left: 290px;
      top: 200px;
    }
    #w2{
      left: 30px;
      top: 200px;
    }

  </style>
</head>

<body>
  <div class="blue-box">
    <div id="w1" class="red-circle"></div>
    <div id="w2" class="red-circle"></div>
    
  </div>

</body>

</html>
